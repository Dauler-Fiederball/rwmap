<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
font-family:Arial;
text-align:center;
margin-top:120px;
background:#f5f5f5;
}

input{
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
font-size:16px;
margin-left:10px;
}

#msg{
color:red;
margin-top:10px;
}
</style>

</head>

<body>

<h2>Passwort eingeben</h2>

<input type="password" id="pw" placeholder="Passwort">
<button onclick="check()">Enter</button>

<p id="msg"></p>

<script>

var correctPassword = "CFL";   // Passwort ändern
var siteURL = "https://sites.google.com/view/cfl-s21/home";  // Deine Site

function check(){

var input = document.getElementById("pw").value;

if(input === correctPassword){
window.location.href = siteURL;
}
else{
document.getElementById("msg").innerText="Falsches Passwort";
}

}

</script>

</body>
</html>
